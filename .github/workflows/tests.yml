name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # The core (compressor, .rou format, API, generators) is standard-library
      # only, so the suite runs without installing pywebview.
      - name: Run test suite
        run: |
          python tests/test_roundtrip.py
          python tests/test_server.py
